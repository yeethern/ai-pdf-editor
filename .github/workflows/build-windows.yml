name: Build Distribution

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm install
          npm run build

      # macOS build — uses the existing build-dist.sh script
      - name: Build macOS distribution
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > backend/.env
          bash build-dist.sh
          mv PDFEditor.zip PDFEditor-macOS.zip

      # Windows build — inline pwsh steps
      - name: Create distribution structure
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir dist\backend\src -Force
          mkdir dist\frontend -Force

      - name: Copy backend files
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item backend\package.json dist\backend\
          Copy-Item backend\tsconfig.json dist\backend\
          Copy-Item -Recurse backend\src dist\backend\src
          if (Test-Path backend\fonts) { Copy-Item -Recurse backend\fonts dist\backend\fonts }

      - name: Copy frontend build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item -Recurse frontend\dist dist\frontend

      - name: Install backend dependencies
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: dist\backend
        run: |
          npm install --omit=dev
          npm install tsx --no-save
          npm install @esbuild/win32-x64 --no-save

      - name: Create launcher scripts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          @"
          @echo off
          cd /d "%~dp0backend"
          start "" http://localhost:3001
          npx tsx src/index.ts
          pause
          "@ | Out-File -FilePath dist\start.bat -Encoding ASCII

          @"
          Set WshShell = CreateObject("WScript.Shell")
          WshShell.CurrentDirectory = CreateObject("Scripting.FileSystemObject").GetParentFolderName(WScript.ScriptFullName) & "\backend"
          WshShell.Run "cmd /c npx tsx src\index.ts", 0, False
          WScript.Sleep 2000
          WshShell.Run "http://localhost:3001"
          "@ | Out-File -FilePath dist\start.vbs -Encoding ASCII

      - name: Create .env file
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" | Out-File -FilePath dist\backend\.env -Encoding ASCII

      - name: Zip Windows distribution
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path * -DestinationPath ..\PDFEditor-Windows.zip

      - name: Upload macOS distribution
        if: matrix.os == 'macos-latest'
        shell: bash
        run: gh release upload v1.0.0 PDFEditor-macOS.zip --clobber

      - name: Upload Windows distribution
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: gh release upload v1.0.0 PDFEditor-Windows.zip --clobber
